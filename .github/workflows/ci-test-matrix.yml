name: CI Test Matrix

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-matrix:
    name: "${{ matrix.os }} tests"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

      - name: UI tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage/

      - name: Privacy/security policy checks
        run: ./scripts/privacy_security_check.sh

      - name: Rust unit + integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  python-oracle-tests:
    name: "Python oracle tests"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build CLI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin binturong-cli

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: pip install -r tests/oracle/requirements.txt

      - name: Run Python oracle tests
        run: python -m pytest tests/oracle/ -v --tb=short

  perf-regression:
    name: "Performance regression"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            tesseract-ocr

      - name: Run release performance benchmark
        run: cargo run --manifest-path src-tauri/Cargo.toml --release --bin perf-bench > perf-bench-ci.csv

      - name: Upload perf benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-bench-ci
          path: perf-bench-ci.csv
          if-no-files-found: error

  dependency-license-audit:
    name: "Dependency and license audit"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Install cargo audit tools
        run: cargo install --locked cargo-audit cargo-license

      - name: Run dependency/license audit
        run: ./scripts/dependency_license_audit.sh
