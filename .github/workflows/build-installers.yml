name: Build Installers and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to publish (example: v1.2.3). Leave empty to build artifacts only."
        required: false
        type: string
      prerelease:
        description: "Mark workflow_dispatch release as pre-release"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installers:
    name: "${{ matrix.label }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (.dmg)
            bundles: dmg
            release_glob: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            label: Windows (.msi + .exe)
            bundles: msi,nsis
            release_glob: >-
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            label: Linux (.AppImage + .deb + .rpm)
            bundles: appimage,deb,rpm
            release_glob: >-
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        run: |
          choco install -y nsis wixtoolset

      - name: Install npm dependencies
        run: npm ci

      - name: Build installers
        env:
          # Keep these optional: when unset, macOS builds remain unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          shopt -s nullglob
          files=( ${{ matrix.release_glob }} )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found for pattern: ${{ matrix.release_glob }}"
            exit 1
          fi
          cp "${files[@]}" release-files/
          ls -lh release-files

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binturong-${{ runner.os }}-release-files
          path: release-files/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build-installers
    if: github.event_name == 'push' || github.event.inputs.tag != ''

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binturong-*-release-files
          merge-multiple: true
          path: release-assets

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release with installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
          files: |
            release-assets/*.dmg
            release-assets/*.msi
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate published assets exist
        shell: bash
        run: |
          set -euo pipefail
          ls -lh release-assets
          count="$(find release-assets -type f | wc -l)"
          if [ "$count" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi
