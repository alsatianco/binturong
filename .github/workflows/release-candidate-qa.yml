name: Release Candidate QA

on:
  workflow_dispatch:

jobs:
  rc-qa:
    name: "${{ matrix.os }} RC QA"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            tesseract-ocr

      - name: Install npm dependencies
        run: npm ci

      - name: Install cargo audit tools
        run: cargo install --locked cargo-audit cargo-license

      - name: Run release candidate QA script
        shell: bash
        env:
          BINTURONG_SKIP_PERF_BENCH: ${{ runner.os != 'Linux' && '1' || '0' }}
        run: ./scripts/release_candidate_qa.sh
