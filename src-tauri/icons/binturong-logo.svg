<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5b4f"/>
      <stop offset="100%" stop-color="#5a4a3e"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c4a8"/>
      <stop offset="100%" stop-color="#c4b498"/>
    </linearGradient>
  </defs>

  <!-- Bright sky-blue rounded background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Body (round and chubby - cute style) -->
  <ellipse cx="256" cy="310" rx="130" ry="120" fill="url(#fur)"/>

  <!-- Belly patch (lighter, warm beige) -->
  <ellipse cx="256" cy="330" rx="75" ry="70" fill="url(#belly)"/>

  <!-- Ears (round and big for cute proportions) -->
  <circle cx="160" cy="155" r="52" fill="#6b5b4f"/>
  <circle cx="352" cy="155" r="52" fill="#6b5b4f"/>
  <!-- Ear inner (pink! cute!) -->
  <circle cx="160" cy="152" r="32" fill="#f9a8c9"/>
  <circle cx="352" cy="152" r="32" fill="#f9a8c9"/>

  <!-- Head (large and round - chibi proportions) -->
  <circle cx="256" cy="235" r="120" fill="url(#fur)"/>

  <!-- Face - lighter muzzle area -->
  <ellipse cx="256" cy="270" rx="72" ry="55" fill="#8b7b6f"/>

  <!-- Eyes - big, round, sparkly (kawaii style) -->
  <!-- Left eye -->
  <circle cx="210" cy="230" r="30" fill="#fff"/>
  <circle cx="215" cy="228" r="20" fill="#2d1b0e"/>
  <circle cx="220" cy="222" r="8" fill="#fff"/>
  <circle cx="210" cy="232" r="4" fill="#fff" opacity="0.6"/>

  <!-- Right eye -->
  <circle cx="302" cy="230" r="30" fill="#fff"/>
  <circle cx="307" cy="228" r="20" fill="#2d1b0e"/>
  <circle cx="312" cy="222" r="8" fill="#fff"/>
  <circle cx="302" cy="232" r="4" fill="#fff" opacity="0.6"/>

  <!-- Eyebrows (soft, friendly arches) -->
  <path d="M 185 198 Q 210 188 235 198" fill="none" stroke="#5a4a3e" stroke-width="4" stroke-linecap="round"/>
  <path d="M 277 198 Q 302 188 327 198" fill="none" stroke="#5a4a3e" stroke-width="4" stroke-linecap="round"/>

  <!-- Nose (small, round, cute black button) -->
  <ellipse cx="256" cy="268" rx="14" ry="10" fill="#2d1b0e"/>
  <!-- Nose shine -->
  <ellipse cx="253" cy="265" rx="5" ry="3.5" fill="#fff" opacity="0.4"/>

  <!-- Mouth (happy smile!) -->
  <path d="M 238 280 Q 248 295 256 295 Q 264 295 274 280" fill="none" stroke="#2d1b0e" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blush cheeks (pink circles - kawaii!) -->
  <circle cx="175" cy="260" r="18" fill="#f9a8c9" opacity="0.5"/>
  <circle cx="337" cy="260" r="18" fill="#f9a8c9" opacity="0.5"/>

  <!-- Whiskers (short and cute) -->
  <line x1="220" y1="270" x2="170" y2="262" stroke="#8b7b6f" stroke-width="2" stroke-linecap="round"/>
  <line x1="218" y1="278" x2="168" y2="280" stroke="#8b7b6f" stroke-width="2" stroke-linecap="round"/>
  <line x1="292" y1="270" x2="342" y2="262" stroke="#8b7b6f" stroke-width="2" stroke-linecap="round"/>
  <line x1="294" y1="278" x2="344" y2="280" stroke="#8b7b6f" stroke-width="2" stroke-linecap="round"/>

  <!-- Little paws at the bottom -->
  <ellipse cx="205" cy="405" rx="30" ry="18" fill="#5a4a3e"/>
  <ellipse cx="307" cy="405" rx="30" ry="18" fill="#5a4a3e"/>
  <!-- Paw pads -->
  <circle cx="195" cy="403" r="6" fill="#d4c4a8"/>
  <circle cx="210" cy="400" r="6" fill="#d4c4a8"/>
  <circle cx="297" cy="403" r="6" fill="#d4c4a8"/>
  <circle cx="312" cy="400" r="6" fill="#d4c4a8"/>

  <!-- Curling tail (binturong signature - cute spiral) -->
  <path d="M 350 340 Q 400 350 410 390 Q 415 430 380 440 Q 345 445 340 420 Q 338 400 358 398"
        fill="none" stroke="#6b5b4f" stroke-width="20" stroke-linecap="round"/>
  <path d="M 350 340 Q 400 350 410 390 Q 415 430 380 440 Q 345 445 340 420 Q 338 400 358 398"
        fill="none" stroke="#8b7b6f" stroke-width="12" stroke-linecap="round"/>

  <!-- Code brackets (cheerful cyan, more visible on light bg) -->
  <text x="62" y="448" font-family="monospace" font-size="64" font-weight="bold" fill="#0ea5e9" opacity="0.6">{</text>
  <text x="400" y="448" font-family="monospace" font-size="64" font-weight="bold" fill="#0ea5e9" opacity="0.6">}</text>
</svg>
