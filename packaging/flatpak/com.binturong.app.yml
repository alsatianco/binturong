app-id: com.binturong.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: binturong
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: binturong
    buildsystem: simple
    build-commands:
      - install -Dm755 binturong /app/bin/binturong
    sources:
      - type: file
        path: binturong
